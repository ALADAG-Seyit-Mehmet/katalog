<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDİRKON 2026 | Premium Furniture Catalog</title>
    <meta name="description" content="Sedirkon 2026 Premium Mobilya Kataloğu – İlham veren tasarımlar, üstün kalite.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }
        .loader {
            text-align: center;
            color: #c9a96e;
        }
        .brand {
            font-size: 2.5rem;
            letter-spacing: 0.3em;
            color: #e8d5b0;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.2s;
        }
        .tagline {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #888;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.5s;
        }
        .spinner {
            margin: 2rem auto;
            width: 36px;
            height: 36px;
            border: 2px solid #333;
            border-top-color: #c9a96e;
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards 0.7s, spin 0.9s linear infinite 0.7s;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="brand">SEDİRKON</div>
        <div class="tagline">Premium Furniture Collection · 2026</div>
        <div class="spinner"></div>
    </div>
    <script>
        (function () {
            // Detect browser language
            var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
            var isTurkish = lang === 'tr' || lang.startsWith('tr-');
            var target = isTurkish ? 'katalog_dergi_tr.html' : 'katalog_dergi_en.html';

            // Small delay so the loading animation is visible
            setTimeout(function () {
                window.location.replace(target);
            }, 1000);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDİRKON 2026 | Premium Furniture Catalog</title>
    <meta name="description" content="Sedirkon 2026 Premium Mobilya Kataloğu – İlham veren tasarımlar, üstün kalite.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        .loader {
            text-align: center;
            color: #c9a96e;
        }
        .brand {
            font-size: 2.5rem;
            letter-spacing: 0.3em;
            color: #e8d5b0;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.2s;
        }
        .tagline {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #888;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.5s;
        }
        .spinner {
            margin: 2rem auto;
            width: 36px;
            height: 36px;
            border: 2px solid #333;
            border-top-color: #c9a96e;
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards 0.7s, spin 0.9s linear infinite 0.7s;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="brand">SEDİRKON</div>
        <div class="tagline">Premium Furniture Collection · 2026</div>
        <div class="spinner"></div>
    </div>
    <script>
        (function () {
            // Detect browser language
            var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
            var isTurkish = lang === 'tr' || lang.startsWith('tr-');
            var target = isTurkish ? 'katalog_dergi_tr.html' : 'katalog_dergi_en.html';

            // Small delay so the loading animation is visible
            setTimeout(function () {
                window.location.replace(target);
            }, 1000);
        })();
    </script>

    <!-- MOBILE WARNING OVERLAY -->
    <script>
        (function() {
            function checkMobile() {
                var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 900;
                if (isMobile && !document.getElementById('mobile-warning-overlay')) {
                    var overlay = document.createElement('div');
                    overlay.id = 'mobile-warning-overlay';
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0';
                    overlay.style.left = '0';
                    overlay.style.width = '100vw';
                    overlay.style.height = '100vh';
                    overlay.style.backgroundColor = '#111';
                    overlay.style.color = '#e8d5b0';
                    overlay.style.zIndex = '999999';
                    overlay.style.display = 'flex';
                    overlay.style.flexDirection = 'column';
                    overlay.style.justifyContent = 'center';
                    overlay.style.alignItems = 'center';
                    overlay.style.textAlign = 'center';
                    overlay.style.padding = '30px';
                    overlay.style.fontFamily = '\'Montserrat\', \'Georgia\', sans-serif';
                    
                    var isEn = window.location.pathname.includes('_en.html') || document.documentElement.lang === 'en';
                    
                    var icon = document.createElement('div');
                    icon.innerHTML = '🖥️';
                    icon.style.fontSize = '60px';
                    icon.style.marginBottom = '20px';
                    
                    var title = document.createElement('h2');
                    title.style.fontFamily = '\'Playfair Display\', serif';
                    title.style.fontSize = '24px';
                    title.style.marginBottom = '15px';
                    title.style.color = '#d4af37';
                    title.innerText = isEn ? 'Desktop Experience Required' : 'Masaüstü Deneyimi Gerekli';
                    
                    var text = document.createElement('p');
                    text.style.fontSize = '15px';
                    text.style.lineHeight = '1.6';
                    text.style.opacity = '0.8';
                    text.innerText = isEn 
                        ? 'This premium digital catalog is designed specifically for desktop screens to showcase our 3D renders and detailed textures properly. Please visit us from a computer.' 
                        : 'Bu premium dijital katalog, 3D renderları ve detaylı dokuları tam çözünürlükte sergilemek için masaüstü ekranlara özel tasarlanmıştır. Lütfen daha iyi bir deneyim için bilgisayarınızdan giriş yapın.';
                        
                    overlay.appendChild(icon);
                    overlay.appendChild(title);
                    overlay.appendChild(text);
                    
                    document.body.appendChild(overlay);
                    document.body.style.overflow = 'hidden';
                } else if (!isMobile && document.getElementById('mobile-warning-overlay')) {
                    var el = document.getElementById('mobile-warning-overlay');
                    el.parentNode.removeChild(el);
                    document.body.style.overflow = '';
                }
            }
            
            // Check on load and resize
            window.addEventListener('load', checkMobile);
            window.addEventListener('resize', checkMobile);
        })();
    </script>

</body>
</html>
